<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Тести з терапевтичних вправ</title>
    <style>
      :root {
        --bg: #f5f6fb;
        --card: #ffffff;
        --text: #151824;
        --muted: #6b7280;
        --primary: #4f46e5;
        --good: #16a34a;
        --bad: #dc2626;
        --soft-good: #dcfce7;
        --soft-bad: #fee2e2;
        --border: #e5e7eb;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .app {
        max-width: 880px;
        margin: 0 auto;
        padding: 18px;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }
      h1 {
        font-size: 22px;
        margin: 0;
      }
      .stats {
        color: var(--muted);
        font-size: 14px;
        white-space: nowrap;
      }
      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 14px;
      }
      select,
      button {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px 14px;
        font-size: 15px;
        background: #fff;
      }
      button {
        cursor: pointer;
        font-weight: 700;
      }
      .primary {
        background: var(--primary);
        border-color: var(--primary);
        color: white;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 22px;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }
      .topic {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: #eef2ff;
        color: #4338ca;
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 12px;
      }
      .question {
        font-size: 21px;
        line-height: 1.35;
        font-weight: 800;
        margin-bottom: 18px;
      }
      .answers {
        display: grid;
        gap: 10px;
      }
      .answer {
        width: 100%;
        text-align: left;
        background: #fff;
        border: 2px solid var(--border);
        border-radius: 16px;
        padding: 14px;
        color: var(--text);
        transition: 0.15s;
      }
      .answer:hover:not(:disabled) {
        border-color: #c7d2fe;
        transform: translateY(-1px);
      }
      .answer.correct {
        background: var(--soft-good);
        border-color: var(--good);
        color: #14532d;
      }
      .answer.wrong {
        background: var(--soft-bad);
        border-color: var(--bad);
        color: #7f1d1d;
      }
      .answer:disabled {
        cursor: default;
      }
      .feedback {
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 14px;
        font-weight: 800;
        display: none;
      }
      .feedback.good {
        display: block;
        background: var(--soft-good);
        color: #14532d;
      }
      .feedback.bad {
        display: block;
        background: var(--soft-bad);
        color: #7f1d1d;
      }
      .footer {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-top: 16px;
      }
      .secondary {
        background: white;
        color: var(--text);
      }
      .progress {
        height: 10px;
        background: #e5e7eb;
        border-radius: 999px;
        overflow: hidden;
        margin-bottom: 14px;
      }
      .progress > div {
        height: 100%;
        width: 0%;
        background: var(--primary);
        transition: 0.2s;
      }
      .empty {
        text-align: center;
        color: var(--muted);
        padding: 40px 10px;
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.75);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        padding: 20px;
      }

      .modal {
        width: min(600px, 100%);
        background: white;
        border-radius: 32px;
        padding: 48px 28px;
        text-align: center;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.25);
        animation: modalPop 0.35s ease;
      }

      .modal h2 {
        margin: 0;
        font-size: clamp(36px, 6vw, 64px);
        line-height: 1.1;
        color: var(--primary);
      }

      .modal button {
        margin-top: 28px;
        min-width: 180px;
      }

      @keyframes modalPop {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @media (max-width: 640px) {
        .app {
          padding: 12px;
        }
        header {
          align-items: flex-start;
          flex-direction: column;
        }
        .controls {
          grid-template-columns: 1fr;
        }
        .card {
          padding: 18px;
          border-radius: 20px;
        }
        .question {
          font-size: 19px;
        }
        .footer {
          flex-direction: column;
        }
      }
    </style>
  </head>

            "Які рухи категорично заборонені при виразковій хворобі через ризик кровотечі або прориву?",
          options: [
            "Повільні рухи руками",
            "Дихальні вправи",
            "Різкі нахили, стрибки та підняття важких предметів",
            "Вправи на розслаблення мʼязів шиї",
          ],
          correct: 2,
        },
        {
          topic: "Тема №13",
          question:
            "Що є абсолютним протипоказанням для призначення ЛФК при захворюваннях шлунка?",
          options: [
            "Період ремісії та відсутність болю",
            "Підозра на шлункову кровотечу або загроза перфорації",
            "Зниження апетиту",
            "Необхідність зміцнення загального імунітету",
          ],
          correct: 1,
        },
      ];

      let filtered = [];
      let index = 0;
      let score = 0;
      let answered = false;

      const topicSelect = document.getElementById("topicSelect");
      const card = document.getElementById("card");
      const stats = document.getElementById("stats");
      const progressBar = document.getElementById("progressBar");

      function shuffle(array) {
        return [...array].sort(() => Math.random() - 0.5);
      }

      function initTopics() {
        const topics = ["Всі теми", ...new Set(QUESTIONS.map((q) => q.topic))];
        topicSelect.innerHTML = topics
          .map((t) => `<option value="${t}">${t}</option>`)
          .join("");
        topicSelect.addEventListener("change", restart);
      }

      function restart() {
        const selected = topicSelect.value;
        filtered =
          selected === "Всі теми"
            ? shuffle(QUESTIONS)
            : shuffle(QUESTIONS.filter((q) => q.topic === selected));

        index = 0;
        score = 0;
        answered = false;
        render();
      }

      function render() {
        if (!filtered.length) {
          card.innerHTML = `<div class="empty">Немає питань у цій темі</div>`;
          return;
        }

        if (index >= filtered.length) {
          const percent = Math.round((score / filtered.length) * 100);
          progressBar.style.width = "100%";
          stats.textContent = `${score} / ${filtered.length}`;
          card.innerHTML = `
          <div class="topic">Результат</div>
          <div class="question">Ти набрав ${score} з ${filtered.length} (${percent}%)</div>
          <button class="primary" onclick="restart()">Пройти ще раз</button>
        `;
          return;
        }

        const q = filtered[index];
        answered = false;
        stats.textContent = `${index + 1} / ${filtered.length} • Правильно: ${score}`;
        progressBar.style.width = `${(index / filtered.length) * 100}%`;

        card.innerHTML = `
        <div class="topic">${q.topic}</div>
        <div class="question">${index + 1}. ${escapeHtml(q.question)}</div>
        <div class="answers">
          ${q.options
            .map(
              (option, i) => `
            <button class="answer" onclick="choose(${i})">
              ${String.fromCharCode(65 + i)}. ${escapeHtml(option)}
            </button>
          `,
            )
            .join("")}
        </div>
        <div id="feedback" class="feedback"></div>
        <div class="footer">
          <button class="secondary" onclick="prev()">Назад</button>
          <button class="primary" onclick="next()">Далі</button>
        </div>
      `;
      }

      function choose(selected) {
        if (answered) return;
        answered = true;

        const q = filtered[index];
        const buttons = [...document.querySelectorAll(".answer")];
        const feedback = document.getElementById("feedback");

        buttons.forEach((btn, i) => {
          btn.disabled = true;
          if (i === q.correct) btn.classList.add("correct");
        });

        if (selected === q.correct) {
          buttons[selected].classList.add("correct");
          feedback.className = "feedback good";
          feedback.textContent = "Правильно ✅";
          score++;
        } else {
          buttons[selected].classList.add("wrong");
          feedback.className = "feedback bad";
          feedback.textContent = `Неправильно ❌ Правильна відповідь: ${q.options[q.correct]}`;
        }

        stats.textContent = `${index + 1} / ${filtered.length} • Правильно: ${score}`;
      }

      function next() {
        index++;
        render();
      }

      function prev() {
        if (index > 0) index--;
        render();
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      initTopics();
      restart();
    </script>
  </body>
</html>
